---
# ──────────────────────────────────────────────────────────────────
# Pipeline Hub — Kubernetes Deployment Manifest
# ──────────────────────────────────────────────────────────────────
# Authentication Options:
#
# Option A — OAuth (recommended):
#   Users log in with their GitHub accounts. Each user's token is
#   used for API calls, giving per-user audit trails.
#
#   kubectl create secret generic pipeline-hub-oauth \
#     --from-literal=GITHUB_CLIENT_ID=Ov23liXXXXXXX \
#     --from-literal=GITHUB_CLIENT_SECRET=your_secret_here \
#     --from-literal=FLASK_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))") \
#     -n YOUR_NAMESPACE
#
# Option B — Shared PAT (legacy):
#   All API calls use a single GitHub Personal Access Token.
#
#   kubectl create secret generic pipeline-hub-github \
#     --from-literal=GITHUB_TOKEN=ghp_YOUR_TOKEN_HERE \
#     -n YOUR_NAMESPACE
#
# Then apply this manifest:
#
#   kubectl apply -f deploy.yaml -n YOUR_NAMESPACE
# ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-hub
  labels:
    app: pipeline-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-hub
  template:
    metadata:
      labels:
        app: pipeline-hub
    spec:
      containers:
      - name: pipeline-hub
        image: YOUR_REGISTRY/pipeline-hub:latest   # ← Replace with your image
        ports:
        - containerPort: 9090
          protocol: TCP
        env:
        # ── Option A: OAuth (recommended) ──────────────────
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: pipeline-hub-oauth
              key: GITHUB_CLIENT_ID
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: pipeline-hub-oauth
              key: GITHUB_CLIENT_SECRET
              optional: true
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pipeline-hub-oauth
              key: FLASK_SECRET_KEY
              optional: true
        # ── Option B: Shared PAT (legacy) ──────────────────
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: pipeline-hub-github
              key: GITHUB_TOKEN
              optional: true
        # ── Common config ──────────────────────────────────
        - name: GITHUB_URL
          value: "https://github.com"                # ← Replace with your GHE URL (e.g. https://github.yourcompany.com)
        - name: GITHUB_ORG
          value: "YOUR_GITHUB_ORG"                  # ← Replace with your org
        - name: BASE_URL
          value: "https://pipeline-hub.example.com"  # ← Replace with your external URL
        # - name: GITHUB_REPOS
        #   value: "my-org/frontend-app,my-org/backend-api"
        - name: PIPELINE_HUB_PORT
          value: "9090"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 9090
          initialDelaySeconds: 3
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-hub
  labels:
    app: pipeline-hub
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    app: pipeline-hub
