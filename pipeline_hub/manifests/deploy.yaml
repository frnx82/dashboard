---
# ──────────────────────────────────────────────────────────────────
# Pipeline Hub — Kubernetes Deployment Manifest
# ──────────────────────────────────────────────────────────────────
# Before applying, create the GitHub token secret:
#
#   kubectl create secret generic pipeline-hub-github \
#     --from-literal=GITHUB_TOKEN=ghp_YOUR_TOKEN_HERE \
#     -n YOUR_NAMESPACE
#
# Then apply this manifest:
#
#   kubectl apply -f deploy.yaml -n YOUR_NAMESPACE
# ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-hub
  labels:
    app: pipeline-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-hub
  template:
    metadata:
      labels:
        app: pipeline-hub
    spec:
      containers:
      - name: pipeline-hub
        image: YOUR_REGISTRY/pipeline-hub:latest   # ← Replace with your image
        ports:
        - containerPort: 9090
          protocol: TCP
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: pipeline-hub-github
              key: GITHUB_TOKEN
        # ── Option A: List all repos from an org ──
        - name: GITHUB_ORG
          value: "YOUR_GITHUB_ORG"                  # ← Replace with your org
        # ── Option B: Specific repos only (comma-separated) ──
        # - name: GITHUB_REPOS
        #   value: "my-org/frontend-app,my-org/backend-api,my-org/billing-service"
        - name: PIPELINE_HUB_PORT
          value: "9090"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 9090
          initialDelaySeconds: 3
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-hub
  labels:
    app: pipeline-hub
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    app: pipeline-hub
